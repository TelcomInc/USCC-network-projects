<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strom Thurmond – WiFi AP Map</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Segoe UI',sans-serif;background:#0f1923;color:#e0e6f0;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
  
  /* Header */
  .header{background:#1a2638;border-bottom:2px solid #c8a84b;padding:10px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
  .header h1{font-size:1.1rem;color:#c8a84b;letter-spacing:0.05em;}
  .header .subtitle{font-size:0.75rem;color:#8899aa;}
  .header-right{margin-left:auto;display:flex;gap:8px;align-items:center;}
  
  /* Floor tabs */
  .tabs{display:flex;background:#141e2c;border-bottom:1px solid #2a3d50;padding:0 12px;flex-shrink:0;}
  .tab{padding:8px 18px;cursor:pointer;font-size:0.82rem;color:#8899aa;border-bottom:3px solid transparent;transition:all 0.2s;user-select:none;}
  .tab:hover{color:#c8a84b;}
  .tab.active{color:#c8a84b;border-bottom-color:#c8a84b;}
  
  /* Main area */
  .main{flex:1;display:flex;overflow:hidden;min-height:0;}
  
  /* Map container */
  .map-wrap{flex:1;overflow:auto;display:flex;justify-content:center;align-items:flex-start;padding:16px;background:#0d1520;}
  .map-container{position:relative;display:inline-block;cursor:crosshair;}
  .floor-img{display:block;max-width:100%;height:auto;user-select:none;}
  .overlay-img{position:absolute;top:0;left:0;width:100%;height:100%;opacity:0;pointer-events:none;mix-blend-mode:multiply;transition:opacity 0.3s;}
  .overlay-img.visible{opacity:0.65;}
  
  /* AP Markers */
  .ap-marker{position:absolute;transform:translate(-50%,-50%);cursor:pointer;z-index:10;}
  .ap-dot{width:22px;height:22px;border-radius:50%;border:2px solid #fff;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;color:#fff;transition:all 0.15s;box-shadow:0 0 6px rgba(0,0,0,0.5);}
  .ap-dot.unassigned{background:#4a90d9;border-color:#87bff5;}
  .ap-dot.assigned{background:#27ae60;border-color:#5ddb8e;}
  .ap-dot.removed{background:#c0392b;border-color:#e74c3c;}
  .ap-dot.no-data{background:#888;border-color:#aaa;}
  .ap-marker:hover .ap-dot{transform:scale(1.4);z-index:20;}
  
  /* Tooltip */
  .tooltip{position:fixed;background:#1a2638;border:1px solid #c8a84b;border-radius:6px;padding:10px 14px;font-size:0.78rem;pointer-events:none;z-index:1000;max-width:280px;box-shadow:0 4px 20px rgba(0,0,0,0.6);display:none;}
  .tooltip.visible{display:block;}
  .tooltip h3{color:#c8a84b;font-size:0.9rem;margin-bottom:6px;}
  .tooltip table{border-collapse:collapse;width:100%;}
  .tooltip td{padding:2px 0;color:#ccc;}
  .tooltip td:first-child{color:#88a0bb;padding-right:10px;white-space:nowrap;font-weight:600;}
  .tooltip .removed-badge{background:#c0392b;color:#fff;padding:2px 7px;border-radius:3px;font-size:0.7rem;font-weight:700;}
  
  /* Side panel */
  .side-panel{width:280px;background:#141e2c;border-left:1px solid #2a3d50;display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;}
  .panel-header{padding:12px 14px;background:#1a2638;border-bottom:1px solid #2a3d50;font-size:0.8rem;color:#c8a84b;font-weight:600;}
  .panel-content{flex:1;overflow-y:auto;padding:8px;}
  
  /* AP List */
  .ap-item{padding:8px 10px;border-radius:4px;cursor:pointer;margin-bottom:2px;display:flex;align-items:center;gap:8px;font-size:0.78rem;transition:background 0.15s;}
  .ap-item:hover{background:#1f2f45;}
  .ap-item.selected{background:#1f3a5a;}
  .ap-dot-small{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .ap-num{font-weight:700;color:#c8a84b;min-width:35px;}
  .ap-info{color:#8899aa;font-size:0.72rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  
  /* Controls */
  .controls{display:flex;gap:6px;align-items:center;}
  .btn{padding:5px 12px;border:1px solid #3a5068;background:#1a2638;color:#c8a84b;border-radius:4px;cursor:pointer;font-size:0.75rem;transition:all 0.2s;white-space:nowrap;}
  .btn:hover{background:#c8a84b;color:#0f1923;border-color:#c8a84b;}
  .btn.active{background:#c8a84b;color:#0f1923;border-color:#c8a84b;}
  .btn.danger{border-color:#c0392b;color:#e74c3c;}
  .btn.danger:hover{background:#c0392b;color:#fff;}
  
  /* Setup panel */
  .setup-panel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#1a2638;border:2px solid #c8a84b;border-radius:8px;padding:20px;z-index:500;min-width:320px;box-shadow:0 10px 40px rgba(0,0,0,0.8);display:none;}
  .setup-panel.visible{display:block;}
  .setup-panel h3{color:#c8a84b;margin-bottom:14px;}
  .form-group{margin-bottom:12px;}
  .form-group label{display:block;font-size:0.8rem;color:#8899aa;margin-bottom:4px;}
  .form-group input,select{width:100%;padding:7px 10px;background:#0d1520;border:1px solid #3a5068;border-radius:4px;color:#e0e6f0;font-size:0.85rem;}
  .form-group input:focus{outline:none;border-color:#c8a84b;}
  .overlay-backdrop{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:499;display:none;}
  .overlay-backdrop.visible{display:block;}
  
  /* Search */
  .search-box{padding:8px;border-bottom:1px solid #2a3d50;}
  .search-box input{width:100%;padding:6px 10px;background:#0d1520;border:1px solid #3a5068;border-radius:4px;color:#e0e6f0;font-size:0.8rem;}
  .search-box input:focus{outline:none;border-color:#c8a84b;}
  
  /* Stats bar */
  .stats-bar{padding:6px 14px;background:#0d1520;border-top:1px solid #2a3d50;font-size:0.72rem;color:#667788;display:flex;gap:16px;flex-shrink:0;}
  .stat{color:#8899aa;}.stat span{color:#c8a84b;font-weight:600;}
  
  /* Legend */
  .legend{display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
  .legend-item{display:flex;align-items:center;gap:4px;font-size:0.7rem;color:#8899aa;}
  .leg-dot{width:10px;height:10px;border-radius:50%;}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>🏢 Strom Thurmond Wellness &amp; Fitness Center</h1>
    <div class="subtitle">WiFi Access Point Interactive Map · Telcom Inc Network Infrastructure</div>
  </div>
  <div class="header-right">
    <div class="legend">
      <div class="legend-item"><div class="leg-dot" style="background:#27ae60"></div>Assigned</div>
      <div class="legend-item"><div class="leg-dot" style="background:#4a90d9"></div>Unassigned</div>
      <div class="legend-item"><div class="leg-dot" style="background:#c0392b"></div>Removed</div>
      <div class="legend-item"><div class="leg-dot" style="background:#888"></div>No Data</div>
    </div>
  </div>
</div>

<div class="tabs" id="floorTabs">
  <div class="tab active" data-floor="1">1st Floor</div>
  <div class="tab" data-floor="2">2nd Floor</div>
  <div class="tab" data-floor="3">3rd Floor</div>
  <div class="tab" data-floor="4">Outdoor</div>
</div>

<div class="main">
  <div class="map-wrap" id="mapWrap">
    <div class="map-container" id="mapContainer">
      <img class="floor-img" id="floorImg" src="" alt="Floor Plan">
      <img class="overlay-img" id="overlayImg" src="" alt="Numbered overlay">
      <div id="apMarkersLayer"></div>
    </div>
  </div>
  
  <div class="side-panel">
    <div class="panel-header" style="display:flex;justify-content:space-between;align-items:center;">
      <span>Access Points</span>
      <div class="controls">
        <button class="btn" id="btnOverlay" title="Toggle numbered overlay" onclick="toggleOverlay()">📋 Overlay</button>
        <button class="btn" id="btnSetup" onclick="openAddMode()" title="Click on map to place new AP">+ Add AP</button>
      </div>
    </div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search AP#, MAC, serial..." oninput="filterList()">
    </div>
    <div class="panel-content" id="apList"></div>
  </div>
</div>

<div class="stats-bar">
  <div class="stat">Total: <span id="statTotal">0</span></div>
  <div class="stat">Assigned: <span id="statAssigned">0</span></div>
  <div class="stat">Active: <span id="statActive">0</span></div>
  <div class="stat">Removed: <span id="statRemoved">0</span></div>
  <div class="stat" id="statFloor"></div>
</div>

<!-- Tooltip -->
<div class="tooltip" id="tooltip"></div>

<!-- Setup backdrop -->
<div class="overlay-backdrop" id="backdrop" onclick="closeSetup()"></div>

<!-- AP Assignment Panel -->
<div class="setup-panel" id="setupPanel">
  <h3 id="setupTitle">Assign AP Number</h3>
  <div class="form-group">
    <label>AP Number</label>
    <input type="number" id="inputApNum" min="1" max="133" placeholder="e.g. 47">
  </div>
  <div id="apPreview" style="background:#0d1520;border-radius:4px;padding:10px;margin-bottom:12px;font-size:0.78rem;min-height:60px;color:#8899aa;"></div>
  <div class="form-group">
    <label>Status</label>
    <select id="inputStatus">
      <option value="active">Active</option>
      <option value="removed">Removed (X marked)</option>
      <option value="no-data">No Data Yet</option>
    </select>
  </div>
  <div style="display:flex;gap:8px;justify-content:flex-end;">
    <button class="btn danger" onclick="deleteCurrentAP()">Delete</button>
    <button class="btn" onclick="closeSetup()">Cancel</button>
    <button class="btn" onclick="saveAssignment()" style="background:#27ae60;border-color:#27ae60;color:#fff;">Save</button>
  </div>
</div>

// ===================== STATE =====================
const STORAGE_KEY = 'sth_ap_map_v1';
let state = {
  floor: 1,
  apMarkers: {},  // markerIndex -> {px,py,ap_num,removed,floor}
  overlayVisible: false,
  addMode: false,
  editingMarker: null,
  nextId: 1
};

// Load from localStorage
function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const s = JSON.parse(saved);
      state.apMarkers = s.apMarkers || {};
      state.nextId = s.nextId || 1;
    } else {
      // First time: populate from detected positions
      initFromDetected();
    }
  } catch(e) { initFromDetected(); }
}

function initFromDetected() {
  let id = 1;
  for (const [floor, positions] of Object.entries(FLOOR_POSITIONS)) {
    for (const pos of positions) {
      state.apMarkers[id] = {
        id, floor: parseInt(floor),
        px: pos.px, py: pos.py,
        ap_num: pos.ap_num,
        removed: pos.removed || false
      };
      id++;
    }
  }
  state.nextId = id;
  saveState();
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    apMarkers: state.apMarkers,
    nextId: state.nextId
  }));
}

// ===================== FLOOR SWITCH =====================
function switchFloor(floor) {
  state.floor = floor;
  document.querySelectorAll('.tab').forEach(t => 
    t.classList.toggle('active', parseInt(t.dataset.floor) === floor));
  
  const meta = FLOOR_META[floor];
  document.getElementById('floorImg').src = FLOOR_IMAGES[floor];
  
  const overlayImg = document.getElementById('overlayImg');
  if (meta.hasOverlay) {
    overlayImg.src = OVERLAY_IMAGES[floor];
    document.getElementById('btnOverlay').style.display = '';
  } else {
    overlayImg.src = '';
    document.getElementById('btnOverlay').style.display = 'none';
    state.overlayVisible = false;
  }
  overlayImg.classList.toggle('visible', state.overlayVisible);
  
  document.getElementById('statFloor').innerHTML = 
    `<span>${meta.label}</span>`;
  
  renderMarkers();
  renderList();
  updateStats();
}

// ===================== MARKERS =====================
function renderMarkers() {
  const layer = document.getElementById('apMarkersLayer');
  layer.innerHTML = '';
  
  const markers = Object.values(state.apMarkers)
    .filter(m => m.floor === state.floor);
  
  for (const m of markers) {
    const div = document.createElement('div');
    div.className = 'ap-marker';
    div.style.left = m.px + '%';
    div.style.top = m.py + '%';
    div.dataset.id = m.id;
    
    const apInfo = m.ap_num ? AP_DATA[m.ap_num] : null;
    let dotClass = 'unassigned';
    if (m.removed) dotClass = 'removed';
    else if (m.ap_num && apInfo && apInfo.mac) dotClass = 'assigned';
    else if (m.ap_num) dotClass = 'no-data';
    
    div.innerHTML = `<div class="ap-dot ${dotClass}">${m.ap_num || '?'}</div>`;
    div.addEventListener('mouseenter', (e) => showTooltip(e, m));
    div.addEventListener('mouseleave', hideTooltip);
    div.addEventListener('click', (e) => { e.stopPropagation(); editMarker(m.id); });
    layer.appendChild(div);
  }
}

// ===================== TOOLTIP =====================
function showTooltip(e, m) {
  const tt = document.getElementById('tooltip');
  const ap = m.ap_num ? AP_DATA[m.ap_num] : null;
  
  let content = `<h3>AP #${m.ap_num || '?'}`;
  if (m.removed) content += ` <span class="removed-badge">REMOVED</span>`;
  content += `</h3><table>`;
  
  if (ap) {
    if (ap.model) content += `<tr><td>Model</td><td>C9120AXI-${ap.model}</td></tr>`;
    if (ap.floor) content += `<tr><td>Floor</td><td>${ap.floor}</td></tr>`;
    if (ap.mac) content += `<tr><td>MAC</td><td style="font-family:monospace">${formatMAC(ap.mac)}</td></tr>`;
    if (ap.serial) content += `<tr><td>Serial</td><td style="font-family:monospace">${ap.serial}</td></tr>`;
    if (ap.location_id) content += `<tr><td>Closet/IDF</td><td style="color:#c8a84b;font-weight:600">${ap.location_id}</td></tr>`;
    if (ap.ap_id) content += `<tr><td>Port</td><td style="color:#5ddb8e;font-weight:600">${ap.ap_id}</td></tr>`;
    if (!ap.mac) content += `<tr><td colspan="2" style="color:#e74c3c">Not yet inventoried</td></tr>`;
  } else {
    content += `<tr><td colspan="2">No AP number assigned yet.<br>Click to assign.</td></tr>`;
  }
  content += `</table>`;
  
  tt.innerHTML = content;
  tt.classList.add('visible');
  positionTooltip(e);
}

function positionTooltip(e) {
  const tt = document.getElementById('tooltip');
  const x = e.clientX + 16, y = e.clientY + 16;
  const maxX = window.innerWidth - tt.offsetWidth - 10;
  const maxY = window.innerHeight - tt.offsetHeight - 10;
  tt.style.left = Math.min(x, maxX) + 'px';
  tt.style.top = Math.min(y, maxY) + 'px';
}

function hideTooltip() { 
  document.getElementById('tooltip').classList.remove('visible'); 
}

function formatMAC(mac) {
  if (!mac || mac.length !== 12) return mac;
  return mac.match(/.{2}/g).join(':').toUpperCase();
}

// ===================== EDIT MARKER =====================
function editMarker(id) {
  state.editingMarker = id;
  const m = state.apMarkers[id];
  document.getElementById('setupTitle').textContent = `Edit AP Marker`;
  document.getElementById('inputApNum').value = m.ap_num || '';
  document.getElementById('inputStatus').value = m.removed ? 'removed' : (m.ap_num ? 'active' : 'no-data');
  updateApPreview();
  document.getElementById('backdrop').classList.add('visible');
  document.getElementById('setupPanel').classList.add('visible');
  document.getElementById('inputApNum').focus();
}

function openAddMode() {
  if (state.addMode) {
    state.addMode = false;
    document.getElementById('btnSetup').textContent = '+ Add AP';
    document.getElementById('btnSetup').classList.remove('active');
    document.getElementById('mapWrap').style.cursor = '';
  } else {
    state.addMode = true;
    document.getElementById('btnSetup').textContent = '✕ Cancel Add';
    document.getElementById('btnSetup').classList.add('active');
    document.getElementById('mapWrap').style.cursor = 'crosshair';
  }
}

// Add new AP by clicking on map
document.getElementById('mapWrap').addEventListener('click', function(e) {
  if (!state.addMode) return;
  const container = document.getElementById('mapContainer');
  const rect = container.getBoundingClientRect();
  const px = ((e.clientX - rect.left) / rect.width * 100);
  const py = ((e.clientY - rect.top) / rect.height * 100);
  
  const id = state.nextId++;
  state.apMarkers[id] = {id, floor: state.floor, px, py, ap_num: null, removed: false};
  saveState();
  renderMarkers();
  
  // Open edit immediately
  editMarker(id);
  state.addMode = false;
  document.getElementById('btnSetup').textContent = '+ Add AP';
  document.getElementById('btnSetup').classList.remove('active');
  document.getElementById('mapWrap').style.cursor = '';
});

function updateApPreview() {
  const num = parseInt(document.getElementById('inputApNum').value);
  const prev = document.getElementById('apPreview');
  if (!num || !AP_DATA[num]) {
    prev.innerHTML = num ? '<span style="color:#e74c3c">AP not found in database</span>' : '<span style="color:#555">Enter AP number to preview data</span>';
    return;
  }
  const ap = AP_DATA[num];
  prev.innerHTML = `<table style="border-collapse:collapse;width:100%">
    ${ap.model ? `<tr><td style="color:#88a0bb;padding-right:8px">Model</td><td>Cisco ${ap.model}</td></tr>` : ''}
    ${ap.mac ? `<tr><td style="color:#88a0bb">MAC</td><td style="font-family:monospace">${formatMAC(ap.mac)}</td></tr>` : ''}
    ${ap.location_id ? `<tr><td style="color:#88a0bb">Closet</td><td style="color:#c8a84b">${ap.location_id}</td></tr>` : ''}
    ${ap.ap_id ? `<tr><td style="color:#88a0bb">Port</td><td style="color:#5ddb8e">${ap.ap_id}</td></tr>` : ''}
    ${!ap.mac ? `<tr><td colspan="2" style="color:#888">No inventory data yet</td></tr>` : ''}
  </table>`;
}

document.getElementById('inputApNum').addEventListener('input', updateApPreview);

function saveAssignment() {
  if (!state.editingMarker) return;
  const num = parseInt(document.getElementById('inputApNum').value) || null;
  const status = document.getElementById('inputStatus').value;
  const m = state.apMarkers[state.editingMarker];
  m.ap_num = num;
  m.removed = status === 'removed';
  saveState();
  renderMarkers();
  renderList();
  updateStats();
  closeSetup();
}

function deleteCurrentAP() {
  if (!state.editingMarker) return;
  if (confirm('Delete this AP marker?')) {
    delete state.apMarkers[state.editingMarker];
    saveState();
    renderMarkers();
    renderList();
    updateStats();
    closeSetup();
  }
}

function closeSetup() {
  document.getElementById('backdrop').classList.remove('visible');
  document.getElementById('setupPanel').classList.remove('visible');
  state.editingMarker = null;
}

// ===================== LIST =====================
function renderList() {
  const list = document.getElementById('apList');
  const query = document.getElementById('searchInput').value.toLowerCase();
  
  const markers = Object.values(state.apMarkers)
    .filter(m => m.floor === state.floor)
    .sort((a,b) => (a.ap_num||999) - (b.ap_num||999));
  
  let html = '';
  for (const m of markers) {
    const ap = m.ap_num ? AP_DATA[m.ap_num] : null;
    
    // Search filter
    if (query) {
      const searchStr = [m.ap_num, ap?.mac, ap?.serial, ap?.location_id, ap?.ap_id]
        .filter(Boolean).join(' ').toLowerCase();
      if (!searchStr.includes(query)) continue;
    }
    
    let color = '#4a90d9';
    if (m.removed) color = '#c0392b';
    else if (m.ap_num && ap?.mac) color = '#27ae60';
    else if (m.ap_num) color = '#888';
    
    const label = m.ap_num ? `AP #${m.ap_num}` : 'Unassigned';
    const sub = m.removed ? 'REMOVED' : 
                (ap?.location_id ? ap.location_id : (ap?.ap_id ? ap.ap_id : 'No data'));
    
    html += `<div class="ap-item" onclick="editMarker(${m.id})">
      <div class="ap-dot-small" style="background:${color}"></div>
      <div class="ap-num">${m.ap_num || '?'}</div>
      <div class="ap-info">${sub}</div>
    </div>`;
  }
  
  if (!html) html = '<div style="padding:20px;text-align:center;color:#556;font-size:0.8rem">No APs found</div>';
  list.innerHTML = html;
}

function filterList() { renderList(); }

// ===================== STATS =====================
function updateStats() {
  const markers = Object.values(state.apMarkers).filter(m => m.floor === state.floor);
  const assigned = markers.filter(m => m.ap_num);
  const removed = markers.filter(m => m.removed);
  const active = markers.filter(m => !m.removed);
  
  document.getElementById('statTotal').textContent = markers.length;
  document.getElementById('statAssigned').textContent = assigned.length;
  document.getElementById('statActive').textContent = active.length;
  document.getElementById('statRemoved').textContent = removed.length;
}

// ===================== OVERLAY =====================
function toggleOverlay() {
  state.overlayVisible = !state.overlayVisible;
  document.getElementById('overlayImg').classList.toggle('visible', state.overlayVisible);
  document.getElementById('btnOverlay').classList.toggle('active', state.overlayVisible);
}

// ===================== TAB CLICK =====================
document.getElementById('floorTabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (tab) switchFloor(parseInt(tab.dataset.floor));
});

// ===================== INIT =====================
loadState();
switchFloor(1);
</script>
</body>
